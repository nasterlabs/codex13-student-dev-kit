version: "3"

includes:
  nsis-naster-archive:
    taskfile: ./packages/nsis-naster-archive/Taskfile.yml
    dir: ./packages/nsis-naster-archive

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Initialize local development environment
    platforms: [windows]
    cmds:
      - task: deps
      - pnpm exec lefthook install
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/setup-local.ps1

  deps:
    desc: Install JavaScript development dependencies with pnpm
    cmds:
      - pnpm install

  build:
    desc: Build the installer (reads .env)
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./apps/setup/scripts/build.ps1

  build:dev:
    desc: Build the dev installer (requires .env.dev)
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./apps/setup/scripts/build.ps1 -EnvFile .env.dev

  build:prod:
    desc: Build the release installer (requires .env.prod)
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./apps/setup/scripts/build.ps1 -EnvFile .env.prod

  build:release:
    desc: Alias for build:prod (backward compatibility)
    platforms: [windows]
    cmds:
      - task: build:prod

  release:metadata:
    desc: Update citation/archive metadata; normally handled by release:prepare; pass CLI_ARGS="-BuildVersion 0.7.0-alpha.1"
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/update-release-metadata.ps1 {{.CLI_ARGS}}

  release:prepare:
    desc: Create a release branch, update versions, refresh release metadata and insert a changelog section; pass TAG=v0.7.0-alpha.1 or omit TAG for prompt
    platforms: [windows]
    vars:
      TAG: '{{.TAG | default ""}}'
      SUPERSEDE_TAG: '{{.SUPERSEDE_TAG | default ""}}'
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/prepare-release.ps1 -Tag "{{.TAG}}" {{if ne .SUPERSEDE_TAG ""}}-SupersedeTag "{{.SUPERSEDE_TAG}}"{{end}}

  release:retry:
    desc: Prepare a follow-up alpha release after a failed tag/build; pass TAG=v0.7.0-alpha.2 SUPERSEDE_TAG=v0.7.0-alpha.1
    platforms: [windows]
    vars:
      TAG: '{{.TAG | default ""}}'
      SUPERSEDE_TAG: '{{.SUPERSEDE_TAG | default ""}}'
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/prepare-release.ps1 -Tag "{{.TAG}}" -SupersedeTag "{{.SUPERSEDE_TAG}}"

  release:conclude:
    desc: Validate edited release notes, run checks, commit release prep and optionally open a PR; pass TAG=v0.7.0-alpha.1 NEXT_VERSION=0.7.1-alpha.0 OPEN_PR=1 or omit TAG for prompt
    platforms: [windows]
    vars:
      TAG: '{{.TAG | default ""}}'
      NEXT_VERSION: '{{.NEXT_VERSION | default ""}}'
      OPEN_PR: '{{.OPEN_PR | default "0"}}'
      SKIP_CHECKS: '{{.SKIP_CHECKS | default "0"}}'
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/conclude-release.ps1 -Tag "{{.TAG}}" {{if ne .NEXT_VERSION ""}}-NextVersion "{{.NEXT_VERSION}}"{{end}} {{if eq .OPEN_PR "1"}}-OpenPullRequest{{end}} {{if eq .SKIP_CHECKS "1"}}-SkipChecks{{end}}

  release:bump-next:
    desc: Start the next development version after a successful release; pass NEXT_VERSION=0.7.1-alpha.0 and optionally OPEN_PR=1
    platforms: [windows]
    vars:
      NEXT_VERSION: '{{.NEXT_VERSION | default ""}}'
      OPEN_PR: '{{.OPEN_PR | default "0"}}'
      SKIP_CHECKS: '{{.SKIP_CHECKS | default "0"}}'
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/bump-next-version.ps1 -NextVersion "{{.NEXT_VERSION}}" {{if eq .OPEN_PR "1"}}-OpenPullRequest{{end}} {{if eq .SKIP_CHECKS "1"}}-SkipChecks{{end}}

  release:check-state:
    desc: Validate release branch state without creating a tag; pass RELEASE_BRANCH=release/v0.7.0-alpha.1
    vars:
      RELEASE_BRANCH: '{{.RELEASE_BRANCH | default ""}}'
    cmds:
      - node ./tools/scripts/check-release-state.cjs --release-branch "{{.RELEASE_BRANCH}}"

  build:nsis-naster-archive:
    desc: Build and copy the Naster Archive NSIS plugin
    platforms: [windows]
    cmds:
      - task: nsis-naster-archive:build

  build:plugin:
    desc: Alias for build:nsis-naster-archive (backward compatibility)
    platforms: [windows]
    cmds:
      - task: build:nsis-naster-archive

  build:assets:
    desc: "Regenerate NSIS bitmap and icon assets from SVG sources (requires bash in PATH — Git Bash or WSL)"
    platforms: [windows]
    sources:
      - assets/brand/codex13-signet-digital.svg
      - assets/brand/codex13-favicon.svg
      - tools/scripts/build-nsis-assets.sh
    generates:
      - apps/setup/assets/nsis/codex13-favicon.ico
      - apps/setup/assets/nsis/codex13.ico
      - apps/setup/assets/nsis/codex13-header.bmp
      - apps/setup/assets/nsis/codex13-wizard.bmp
    cmds:
      - bash ./tools/scripts/build-nsis-assets.sh

  build:brand-assets:
    desc: Regenerate all committed brand images
    platforms: [windows]
    deps:
      - build:assets
      - build:readme-header
      - build:screenshots
      - build:social-preview

  build:readme-header:
    desc: "Regenerate README header image (requires bash and ImageMagick)"
    platforms: [windows]
    sources:
      - assets/brand/codex13-signet-digital.svg
      - tools/scripts/build-readme-header.sh
    generates:
      - docs/assets/readme-header-dark.png
      - docs/assets/readme-header-light.png
    cmds:
      - bash ./tools/scripts/build-readme-header.sh

  build:social-preview:
    desc: "Regenerate GitHub social preview image (requires bash and ImageMagick)"
    platforms: [windows]
    sources:
      - assets/brand/codex13-signet-digital.svg
      - tools/scripts/build-social-preview.sh
    generates:
      - docs/assets/social-preview.png
      - docs/assets/social-preview-branding.png
      - docs/assets/social-preview-conservative.png
      - docs/assets/social-preview-landing.png
      - docs/assets/social-preview-minimal.png
    cmds:
      - bash ./tools/scripts/build-social-preview.sh

  build:screenshots:
    desc: "Regenerate framed README screenshots (requires bash and ImageMagick)"
    platforms: [windows]
    sources:
      - docs/screenshots/*.png
      - docs/screenshots/*.jpg
      - docs/screenshots/*.jpeg
      - tools/scripts/build-screenshot-assets.sh
    generates:
      - docs/screenshots/framed/*.png
    cmds:
      - bash ./tools/scripts/build-screenshot-assets.sh

  signing:dev-cert:
    desc: Generate and trust a local self-signed code signing certificate
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/dev/setup-dev-cert.ps1

  clean:
    desc: Remove ignored local build output (.build, dist, native bin/obj)
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath .build,dist,packages/nsis-naster-archive/bin,packages/nsis-naster-archive/obj -Recurse -Force -ErrorAction SilentlyContinue"

  lint:
    desc: Lint PowerShell scripts with PSScriptAnalyzer
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/lint-ps.ps1

  check:repo:
    desc: Run repository source/index checks
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/check-repo.ps1

  check:editorconfig:
    desc: Check EditorConfig compliance (requires pnpm install)
    cmds:
      - pnpm run check:editorconfig

  check:md:
    desc: Lint Markdown files with markdownlint-cli2 (requires pnpm install)
    cmds:
      - pnpm run check:md

  check:yaml:
    desc: Parse and validate YAML files (requires pnpm install)
    cmds:
      - pnpm run check:yaml

  check:changelog:
    desc: Verify generated changelog encoding and dependency formatting
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/check-changelog-generation.ps1

  check:spelling:
    desc: Spell-check Markdown files with cspell (requires pnpm install)
    cmds:
      - pnpm run check:spelling

  check:
    desc: Run all non-installing checks
    platforms: [windows]
    deps:
      - check:repo
      - lint
      - check:editorconfig
      - check:changelog
      - check:md
      - check:yaml
      - check:spelling

  doctor:
    desc: Check that all required dev tools are installed and configured
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/doctor.ps1

  format:ps:
    desc: Auto-format PowerShell scripts with Invoke-Formatter
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/format-ps.ps1

  verify:package:
    desc: Verify an archive; pass CLI_ARGS="-ArchivePath path -ExpectedSha256 hash"
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./apps/setup/src/installer-scripts/verify-package.ps1 {{.CLI_ARGS}}

  verify-vendor:
    desc: Verify vendored setup binaries against committed SHA256 checksums
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/verify-vendor.ps1

  commit:check:
    desc: Validate conventional commit messages in a range; pass CLI_ARGS="-From main -To HEAD"
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/check-conventional-commits.ps1 {{.CLI_ARGS}}

  dco:check:
    desc: Validate DCO sign-offs in a range; pass CLI_ARGS="-From main -To HEAD -RequireVerifiedSignatures"
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/scripts/check-dco.ps1 {{.CLI_ARGS}}

  reset-installer-language:
    desc: "Dev utility: remove InstallerLanguage registry value so the language dialog appears again on next installer run (HKCU\\Software\\NasterLabs\\Codex13SDK)"
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -Command "Remove-ItemProperty -Path 'HKCU:\Software\NasterLabs\Codex13SDK' -Name 'InstallerLanguage' -ErrorAction SilentlyContinue"
