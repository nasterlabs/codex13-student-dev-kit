name: Update automerge PR branches

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      label:
        description: Label that opts a PR into automated branch updates
        required: false
        default: automerge
        type: string
      dry_run:
        description: List eligible PRs without updating branches
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: update-automerge-prs-main
  cancel-in-progress: false

jobs:
  update:
    name: Update automerge PR branches
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Update eligible pull request branches
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          AUTOMERGE_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.label || 'automerge' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: >-
          node tools/scripts/update-automerge-pr-branches.cjs
          --repo "${{ github.repository }}"
          --base-branch main
