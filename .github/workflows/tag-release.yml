name: Tag release
# cspell: words appid pipefail

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_branch:
        description: Release branch to validate, for example release/v0.7.0-alpha.1
        required: true
        type: string
      ref:
        description: Commit, branch or tag to validate
        required: false
        default: main
        type: string
      dry_run:
        description: Validate and stop before creating the tag
        required: true
        default: true
        type: boolean

permissions:
  checks: read
  contents: read
  pull-requests: read

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release/')
      )
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout merged release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.merge_commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Validate release state
        id: release
        env:
          RELEASE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.release_branch || github.event.pull_request.head.ref }}
        run: node tools/scripts/check-release-state.cjs

      - name: Resolve post-release next version
        id: next-version
        shell: pwsh
        env:
          PR_BODY: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}
        run: |
          $semverPattern = '^v?(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-((0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          $nextVersion = ""
          $match = [regex]::Match($env:PR_BODY, '(?m)^Release-Next-Version:\s*(?<version>\S+)\s*$')
          if ($match.Success) {
            $candidate = $match.Groups["version"].Value.Trim()
            if ($candidate -notmatch $semverPattern) {
              throw "Release-Next-Version must be valid SemVer, for example 0.7.1-alpha.0. Actual: $candidate"
            }

            $nextVersion = $candidate.TrimStart("v")
          }

          if ([string]::IsNullOrWhiteSpace($nextVersion)) {
            "has_next_version=false" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding ASCII
            "next_version=" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding ASCII
            Write-Host "No post-release next version requested."
          } else {
            "has_next_version=true" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding ASCII
            "next_version=$nextVersion" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding ASCII
            Write-Host "Post-release next version requested: $nextVersion"
          }

      - name: Wait for main checks
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node tools/scripts/wait-for-check-runs.cjs
          --repo "${{ github.repository }}"
          --sha "${{ github.event.pull_request.merge_commit_sha }}"
          --required "DCO and signed commits,Repository checks,Build installer,Analyze (actions),Analyze (c-cpp),Analyze (javascript-typescript)"
          --timeout-seconds 1200
          --interval-seconds 15

      - name: Check tag does not exist
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags

          if git rev-parse "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.release.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create and push tag
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        shell: bash
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          NEXT_VERSION: ${{ steps.next-version.outputs.next_version }}
        run: |
          set -euo pipefail

          git config user.name "nasterlabs-release-bot[bot]"
          git config user.email "nasterlabs-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          tag_args=(-a "${{ steps.release.outputs.tag }}" -m "${{ steps.release.outputs.tag }}")
          if [[ -n "${NEXT_VERSION}" ]]; then
            tag_args+=(-m "Release-Next-Version: ${NEXT_VERSION}")
          fi

          git tag "${tag_args[@]}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: echo "Dry run passed for ${{ steps.release.outputs.tag }}. No tag was created."
