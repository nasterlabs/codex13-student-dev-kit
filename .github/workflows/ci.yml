name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Repository checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify vendored binaries
        shell: pwsh
        run: ./scripts/verify-vendor.ps1

      - name: Run checks
        shell: pwsh
        run: task check

  # commitlint and dco run in parallel with check intentionally — they validate
  # different things (commit messages vs. repo state) and failing fast on either
  # gives contributors quicker feedback without waiting for the other to finish.
  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch PR range
        shell: pwsh
        run: |
          git fetch --no-tags origin `
            "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" `
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to "origin/pr/${{ github.event.pull_request.number }}"

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch PR range
        shell: pwsh
        run: |
          git fetch --no-tags origin `
            "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" `
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}"

      - name: Validate DCO sign-offs
        shell: pwsh
        run: ./tools/scripts/check-dco.ps1 -From "origin/${{ github.base_ref }}" -To "origin/pr/${{ github.event.pull_request.number }}"

  build:
    name: Build installer
    runs-on: windows-latest
    needs: check
    # Skip build on fork PRs — forks don't have access to repo secrets and
    # uploading artifacts from untrusted forks is a supply-chain risk.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ github.token }}

      - name: Cache NSIS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build\nsis
          key: nsis-3.12-${{ runner.os }}

      - name: Install NSIS
        shell: pwsh
        run: |
          ./tools/scripts/setup-nsis.ps1

      - name: Configure environment
        shell: pwsh
        run: |
          $nsis = $env:NSIS_PATH
          if ([string]::IsNullOrWhiteSpace($nsis)) {
            throw "NSIS_PATH was not set by setup-nsis.ps1."
          }
          "NSIS_PATH=$nsis" | Set-Content -LiteralPath .env -Encoding ASCII
          "SIGNING_ENABLED=0" | Add-Content -LiteralPath .env -Encoding ASCII

      - name: Build
        shell: pwsh
        run: task build

      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Codex13SDK-Setup-dev
          path: dist/setup/Codex13SDK-Setup-dev.exe
          if-no-files-found: error
          retention-days: 7
