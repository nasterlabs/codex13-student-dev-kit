name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Repository checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --offline

      - name: Check lockfile was not modified
        shell: bash
        run: git diff --exit-code -- pnpm-lock.yaml package.json

      - name: Verify vendored binaries
        shell: pwsh
        run: ./scripts/verify-vendor.ps1

      - name: Run checks
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: task check

  # commitlint and commit provenance checks run in parallel with check
  # intentionally — they validate different things (commit messages vs. repo
  # state/provenance) and failing fast on either gives contributors quicker
  # feedback without waiting for the other to finish.
  pr-metadata:
    name: Pull request metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --offline

      - name: Validate PR title
        if: >
          !(
            (github.event.pull_request.user.login == 'dependabot[bot]' &&
              startsWith(github.event.pull_request.head.ref, 'dependabot/')) ||
            (github.event.pull_request.user.login == 'renovate[bot]' &&
              startsWith(github.event.pull_request.head.ref, 'renovate/'))
          )
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          mkdir -p .build
          printf '%s\n' "$PR_TITLE" > .build/pr-title.txt
          pnpm exec commitlint --edit .build/pr-title.txt

      - name: Validate PR branch and body
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node tools/scripts/check-pr-metadata.cjs

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch PR range
        shell: pwsh
        run: |
          git fetch --no-tags origin `
            "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" `
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --offline

      - name: Check lockfile was not modified
        shell: bash
        run: git diff --exit-code -- pnpm-lock.yaml package.json

      - name: Validate PR commits
        run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to "origin/pr/${{ github.event.pull_request.number }}"

  dco:
    name: DCO and signed commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch PR range
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          git fetch --no-tags origin `
            "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" `
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}"

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./tools/scripts/check-dco.ps1 -From "origin/${{ github.base_ref }}" -To "origin/pr/${{ github.event.pull_request.number }}" -RequireVerifiedSignatures

      - name: Validate pushed commits
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./tools/scripts/check-dco.ps1 -From "${{ github.event.before }}" -To "${{ github.sha }}" -RequireVerifiedSignatures

  build:
    name: Build installer
    runs-on: windows-latest
    needs: check
    # Skip build on fork PRs — forks don't have access to repo secrets and
    # uploading artifacts from untrusted forks is a supply-chain risk.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ github.token }}

      - name: Cache NSIS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build\nsis
          key: nsis-3.12-${{ runner.os }}

      - name: Install NSIS
        shell: pwsh
        run: |
          ./tools/scripts/setup-nsis.ps1

      - name: Configure environment
        shell: pwsh
        run: |
          $nsis = $env:NSIS_PATH
          if ([string]::IsNullOrWhiteSpace($nsis)) {
            throw "NSIS_PATH was not set by setup-nsis.ps1."
          }
          "NSIS_PATH=$nsis" | Set-Content -LiteralPath .env -Encoding ASCII
          "SIGNING_ENABLED=0" | Add-Content -LiteralPath .env -Encoding ASCII

      - name: Build
        shell: pwsh
        run: task build

      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Codex13SDK-Setup-dev
          path: dist/setup/Codex13SDK-Setup-dev.exe
          if-no-files-found: error
          retention-days: 7
