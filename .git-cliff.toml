footer = ""

trim = true

postprocessors = [
  { pattern = ' +$', replace = "" },
  { pattern = '\n{3,}', replace = "\n\n" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_parsers = [
  { message = "^feat", group = "✨ Features" },

  { message = "^fix\\(deps", group = "⬆️ Dependencies" },
  { message = "^fix\\(security\\)", group = "🔒 Security" },
  { message = "^fix", group = "🐛 Fixes" },

  { message = "^perf", group = "⚡ Performance" },
  { message = "^docs", group = "📝 Documentation" },
  { message = "^refactor", group = "♻️ Refactoring" },

  { message = "^chore\\(deps", group = "⬆️ Dependencies" },
  { message = "^build\\(deps", group = "⬆️ Dependencies" },
  { body = ".*dependabot.*", group = "⬆️ Dependencies" },

  { message = "^ci", group = "🏗️ Build, CI and Release Automation" },
  { message = "^test", group = "🏗️ Build, CI and Release Automation" },
  { message = "^build", group = "🏗️ Build, CI and Release Automation" },

  { message = "^chore\\(security\\)", group = "🔒 Security" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore: use pwsh for developer tooling", group = "🏗️ Build, CI and Release Automation" },
  { message = "^chore: replace eclint editorconfig check", group = "🏗️ Build, CI and Release Automation" },
  { message = "^chore: verify signed commits", group = "🏗️ Build, CI and Release Automation" },
  { message = "^chore", group = "🧹 Maintenance" },
]

[remote.github]
owner = "nasterlabs"
repo = "codex13-student-dev-kit"
