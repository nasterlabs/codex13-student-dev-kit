version: "3"

tasks:
  default:
    desc: List nsis-naster-archive tasks
    cmds:
      - task --list

  build:
    desc: Build the Unicode Win32 NSIS plugin and copy it into the Setup vendor directory
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./build.ps1

  build:no-copy:
    desc: Build the plugin without copying it into the Setup vendor directory
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./build.ps1 -NoCopy

  clean:
    desc: Remove package-local build output
    platforms: [windows]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath ./bin,./obj -Recurse -Force -ErrorAction SilentlyContinue"
